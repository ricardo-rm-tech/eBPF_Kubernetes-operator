---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - autoremediation.tfg.local
  resources:
  - ioremediationpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoremediation.tfg.local
  resources:
  - ioremediationpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - autoremediation.tfg.local
  resources:
  - ioremediationpolicies/status
  verbs:
  - get
  - patch
  - update
